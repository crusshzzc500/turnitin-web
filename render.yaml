services:
  - type: web
    name: turnitin-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: MINH_CHUNG_PUBLIC_MODE
        value: "0"
      - key: MINH_CHUNG_AUTH_MODE
        value: "password"
      - key: MINH_CHUNG_ORGANIZATION_NAME
        value: "Minh Chung Workspace"
      - key: DATABASE_URL
        sync: false
      - key: MINH_CHUNG_DOCUMENT_MAX_BYTES
        value: "250000000"
      - key: MINH_CHUNG_WEB_DISCOVERY_MAX_QUERIES
        value: "10"
      - key: MINH_CHUNG_WEB_DISCOVERY_MAX_RESULTS
        value: "10"
      - key: MINH_CHUNG_WEB_DISCOVERY_PARALLEL_WORKERS
        value: "10"
      - key: MINH_CHUNG_WEB_DISCOVERY_MODE
        value: "fast"
      - key: MINH_CHUNG_WEB_DISCOVERY_TIME_BUDGET_SECONDS
        value: "22"
      - key: MINH_CHUNG_WEB_DISCOVERY_REQUEST_TIMEOUT_SECONDS
        value: "7"
      - key: MINH_CHUNG_WEB_DISCOVERY_FALLBACK_MIN_SOURCES
        value: "8"
      - key: MINH_CHUNG_WEB_DISCOVERY_EXA_MAX_QUERIES
        value: "3"
      - key: MINH_CHUNG_WEB_DISCOVERY_EXA_MODE
        value: "instant"
      - key: MINH_CHUNG_WEB_DISCOVERY_WEBSEARCHAPI_MAX_QUERIES
        value: "1"
      - key: MINH_CHUNG_WEB_DISCOVERY_LINKUP_MAX_QUERIES
        value: "1"
      - key: MINH_CHUNG_WEB_DISCOVERY_LINKUP_DEPTH
        value: "fast"
      - key: MINH_CHUNG_WEB_DISCOVERY_SERPER_MAX_QUERIES
        value: "1"
      - key: MINH_CHUNG_WEB_DISCOVERY_ENRICHMENT_MAX_SOURCES
        value: "2"
      - key: GEMINI_MODEL
        value: "gemini-3-flash-preview"
      - key: MINH_CHUNG_GEMINI_QUERY_EXPANSION_MAX_QUERIES
        value: "3"
      - key: MINH_CHUNG_GEMINI_TIMEOUT_SECONDS
        value: "4"
      - key: MINH_CHUNG_GEMINI_REVISION_TIMEOUT_SECONDS
        value: "45"
      - key: MINH_CHUNG_GEMINI_REVISION_MAX_INPUT_CHARS
        value: "30000"
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: "gpt-5-nano"
      - key: MINH_CHUNG_OPENAI_QUERY_EXPANSION_MAX_QUERIES
        value: "3"
      - key: MINH_CHUNG_OPENAI_TIMEOUT_SECONDS
        value: "4"
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: WEBSEARCHAPI_API_KEY
        sync: false
      - key: LINKUP_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: BRAVE_SEARCH_API_KEY
        sync: false
